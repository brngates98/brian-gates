# Build Astro to dist/ and deploy to GitHub Pages.
# Repo Settings → Pages → Source: GitHub Actions.
# Custom domain briangates.tech: add CNAME in DNS (see README).

name: Deploy GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          PUBLIC_WEB3FORMS_ACCESS_KEY: ${{ secrets.WEB3FORMS_ACCESS_KEY }}
          # Optional: Grafana Cloud Frontend Observability source map uploads
          # https://grafana.com/docs/grafana-cloud/monitor-applications/frontend-observability/configure/sourcemap-uploads/
          FARO_API_KEY: ${{ secrets.FARO_API_KEY }}
          FARO_SOURCEMAP_ENDPOINT: ${{ secrets.FARO_SOURCEMAP_ENDPOINT }}
          FARO_APP_ID: ${{ secrets.FARO_APP_ID }}
          FARO_STACK_ID: ${{ secrets.FARO_STACK_ID }}
          PUBLIC_FARO_APP_ID: ${{ secrets.FARO_APP_ID }}
          PUBLIC_FARO_APP_VERSION: ${{ github.sha }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
